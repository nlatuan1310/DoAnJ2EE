spring:
  application:
    name: SpendwiseAI

  profiles:
    active: dev

  # ==========================================
  # PostgreSQL – Neon.tech Cloud Database
  # ==========================================
  datasource:
    url: ${DB_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  # ==========================================
  # JPA / Hibernate
  # ==========================================
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ==========================================
  # Security – JWT is handled in SecurityConfig
  # ==========================================

  # ==========================================
  # Spring AI – Google Gemini
  # ==========================================
  ai:
    google:
      genai:
        api-key: ${SPRING_AI_GOOGLE_GENAI_API_KEY:}
        chat:
          options:
            model: gemini-2.5-flash

  # ==========================================
  # Mail Configuration
  # ==========================================
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true



server:
  port: 8080

# ==========================================
# JWT Configuration
# ==========================================
jwt:
  secret: ${JWT_SECRET:SpendWiseAI-Default-Secret-Key-Change-In-Production-2024-Very-Long-Key}
  expiration: 86400000  # 24 giờ (ms)

