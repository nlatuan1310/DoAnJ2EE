spring:
  application:
    name: SpendwiseAI

  profiles:
    active: dev

  # ==========================================
  # PostgreSQL – Neon.tech Cloud Database
  # ==========================================
  datasource:
    url: ${DB_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  # ==========================================
  # JPA / Hibernate
  # ==========================================
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ==========================================
  # Security – JWT is handled in SecurityConfig
  # ==========================================

  # ==========================================
  # Spring AI – Google Gemini
  # ==========================================
  ai:
    google:
      genai:
        api-key: AIzaSyBzZRh0Ab8dtuaXFZOI1dKOg_Yl7TwlzzI
        chat:
          options:
            model: gemini-2.0-flash

server:
  port: 8080

# ==========================================
# JWT Configuration
# ==========================================
jwt:
  secret: ${JWT_SECRET:SpendWiseAI-Default-Secret-Key-Change-In-Production-2024-Very-Long-Key}
  expiration: 86400000  # 24 giờ (ms)

